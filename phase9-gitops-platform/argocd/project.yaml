# ArgoCD AppProject — Phase 9 GitOps Platform
# Mở rộng destinations cho namespace Phase 5 + Phase 8 + platform
# Áp dụng: kubectl apply -f phase9-gitops-platform/argocd/project.yaml -n argocd
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: banking-platform
  namespace: argocd
  labels:
    app.kubernetes.io/name: banking-platform
    app.kubernetes.io/part-of: phase9-gitops
spec:
  description: "Phase 9 — Platform CI/CD, infra Phase 5, app Phase 8"
  sourceRepos:
    - https://github.com/YOUR_ORG/banking-demo.git
    - https://charts.bitnami.com/bitnami
    - oci://registry-1.docker.io/bitnamicharts
    - https://charts.konghq.com
    - https://helm.releases.hashicorp.com
    - https://charts.external-secrets.io
    - https://helm.goharbor.io
  destinations:
    - namespace: banking
      server: https://kubernetes.default.svc
    - namespace: kong
      server: https://kubernetes.default.svc
    - namespace: redis
      server: https://kubernetes.default.svc
    - namespace: postgres
      server: https://kubernetes.default.svc
    - namespace: rabbit
      server: https://kubernetes.default.svc
    - namespace: platform
      server: https://kubernetes.default.svc
    - namespace: vault
      server: https://kubernetes.default.svc
    - namespace: external-secrets
      server: https://kubernetes.default.svc
    - namespace: argocd
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
    - group: external-secrets.io
      kind: ClusterSecretStore
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
  orphanedResources:
    warn: true
