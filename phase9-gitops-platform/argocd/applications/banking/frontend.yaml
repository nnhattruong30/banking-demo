# Frontend
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: banking-frontend
  namespace: argocd
  labels:
    app.kubernetes.io/name: banking-demo
    app.kubernetes.io/component: frontend
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: banking-platform
  source:
    repoURL: https://github.com/YOUR_ORG/banking-demo.git
    targetRevision: main
    path: phase2-helm-chart/banking-demo
    helm:
      releaseName: banking-frontend
      valueFiles:
        - charts/common/values.yaml
        - charts/frontend/values.yaml
        - ../../phase9-gitops-platform/gitops/values-images.yaml
      parameters:
        - name: namespace.enabled
          value: "false"
        - name: secret.enabled
          value: "false"
        - name: postgres.enabled
          value: "false"
        - name: redis.enabled
          value: "false"
        - name: kong.enabled
          value: "false"
        - name: auth-service.enabled
          value: "false"
        - name: account-service.enabled
          value: "false"
        - name: transfer-service.enabled
          value: "false"
        - name: notification-service.enabled
          value: "false"
        - name: api-producer.enabled
          value: "false"
        - name: frontend.enabled
          value: "true"
        - name: ingress.enabled
          value: "false"
  destination:
    server: https://kubernetes.default.svc
    namespace: banking
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - ApplyOutOfSyncOnly=true
