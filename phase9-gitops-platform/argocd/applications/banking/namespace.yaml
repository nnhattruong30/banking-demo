# Namespace + banking-db-secret skeleton (Secret thật từ Vault/ESO)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: banking-namespace
  namespace: argocd
  labels:
    app.kubernetes.io/name: banking-demo
    app.kubernetes.io/component: namespace
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: banking-platform
  source:
    repoURL: https://github.com/YOUR_ORG/banking-demo.git
    targetRevision: main
    path: phase2-helm-chart/banking-demo
    helm:
      releaseName: banking-namespace
      valueFiles:
        - charts/common/values.yaml
      parameters:
        - name: namespace.enabled
          value: "true"
        - name: secret.enabled
          value: "true"
        - name: postgres.enabled
          value: "false"
        - name: redis.enabled
          value: "false"
        - name: kong.enabled
          value: "false"
        - name: auth-service.enabled
          value: "false"
        - name: account-service.enabled
          value: "false"
        - name: transfer-service.enabled
          value: "false"
        - name: notification-service.enabled
          value: "false"
        - name: api-producer.enabled
          value: "false"
        - name: frontend.enabled
          value: "false"
        - name: ingress.enabled
          value: "false"
  destination:
    server: https://kubernetes.default.svc
    namespace: banking
  syncPolicy:
    automated:
      prune: false
      selfHeal: false
    syncOptions:
      - CreateNamespace=true
