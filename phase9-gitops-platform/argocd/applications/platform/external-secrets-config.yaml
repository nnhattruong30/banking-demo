# ExternalSecret manifests — apply sau ESO controller Ready
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-external-secrets-config
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: phase9-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: banking-platform
  source:
    repoURL: https://github.com/YOUR_ORG/banking-demo.git
    targetRevision: main
    path: phase9-gitops-platform/vault/external-secrets
    directory:
      exclude: README.md
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
