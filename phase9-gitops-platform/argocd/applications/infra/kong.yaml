# Kong HA DB mode — Phase 5, ns kong
# Sau sync: chạy kong-import-job Phase 8 (Job không nằm trong chart Kong)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infra-kong
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: phase9-gitops
    app.kubernetes.io/component: kong
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: banking-platform
  sources:
    - repoURL: https://charts.konghq.com
      chart: kong
      targetRevision: 2.38.0
      helm:
        releaseName: kong
        valueFiles:
          - $values/phase5-architecture-refactor/kong-ha/values-kong-ha.yaml
    - repoURL: https://github.com/YOUR_ORG/banking-demo.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: kong
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: false
      selfHeal: true
