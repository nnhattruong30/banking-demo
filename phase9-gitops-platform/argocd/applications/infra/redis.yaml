# Redis HA — Phase 5 (Bitnami), ns redis
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infra-redis
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: phase9-gitops
    app.kubernetes.io/component: redis
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: banking-platform
  sources:
    - repoURL: oci://registry-1.docker.io/bitnamicharts
      chart: redis
      targetRevision: 20.6.2
      helm:
        releaseName: redis-ha
        valueFiles:
          - $values/phase5-architecture-refactor/redis-ha/values-redis-ha.yaml
    - repoURL: https://github.com/YOUR_ORG/banking-demo.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: redis
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: false
      selfHeal: true
