# Postgres HA — Phase 5 (Bitnami), ns postgres
# Values: phase5-architecture-refactor/postgres-ha/values-postgres-ha.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infra-postgres
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: phase9-gitops
    app.kubernetes.io/component: postgres
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: banking-platform
  sources:
    - repoURL: oci://registry-1.docker.io/bitnamicharts
      chart: postgresql
      targetRevision: 15.5.32
      helm:
        releaseName: postgres-ha
        valueFiles:
          - $values/phase5-architecture-refactor/postgres-ha/values-postgres-ha.yaml
    - repoURL: https://github.com/YOUR_ORG/banking-demo.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: postgres
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: false
      selfHeal: true
