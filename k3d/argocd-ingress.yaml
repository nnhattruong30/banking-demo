# ArgoCD Ingress — Traefik, Mô hình SSL 1
# TLS terminate tại Nginx LB; Traefik nhận HTTP
# Apply: kubectl apply -f phase9-gitops-platform/k3d/argocd-ingress.yaml
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-npd
  namespace: argocd
spec:
  ingressClassName: traefik
  rules:
    - host: argocd-npd.co
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: argocd-server
                port:
                  number: 80
